<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palak Oberoi | Portfolio</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --blush: #fce4ec;
            --hot-pink: #ff477e;
            --gold: #d4af37;
            --gold-dark: #b8860b;
            --charcoal: #333333;
            --white: #ffffff;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--blush); color: var(--charcoal); line-height: 1.7; scroll-behavior: smooth; }
        h1, h2, h3 { font-family: 'Playfair Display', serif; }
        .container { max-width: 1100px; margin: 0 auto; padding: 0 20px; }

        header { min-height: 100vh; display: flex; align-items: center; background: linear-gradient(135deg, #fff9fb 0%, #fce4ec 100%); }
        .hero-grid { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 60px; align-items: center; }
        .badge { display: inline-block; background: var(--gold); color: white; padding: 8px 24px; border-radius: 50px; font-weight: 600; font-size: 0.9rem; margin-bottom: 25px; }
        .hero-text h1 { font-size: 4.5rem; color: var(--gold-dark); }
        .hero-text h2 { font-size: 1.4rem; font-weight: 300; margin-bottom: 20px; }
        
        .profile-img-frame img { width: 100%; border-radius: 15px; border: 8px solid var(--white); box-shadow: 15px 15px 0px var(--gold); }

        section { padding: 80px 0; }
        .section-title { text-align: center; font-size: 2.8rem; margin-bottom: 60px; color: var(--gold-dark); }

        .app-container {
            max-width: 450px;
            margin: 0 auto;
            border-radius: 40px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 12px solid #333;
            height: 750px;
        }

        .app-btn-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: var(--hot-pink);
            text-decoration: underline;
            font-weight: 600;
        }
    </style>
</head>

<body>

<header>
    <div class="container hero-grid">
        <div class="hero-text">
            <div class="badge">Incoming Tax Intern — PwC Summer 2027</div>
            <h1>Palak Oberoi</h1>
            <h2>Sophomore at Rutgers Business School</h2>
        </div>
        <div class="profile-img-frame">
            <img src="Assets/profilepic.jpeg">
        </div>
    </div>
</header>

<section id="projects">
    <div class="container">
        <h2 class="section-title">Interactive Projects</h2>

        <!-- EXISTING APP -->
        <p style="text-align:center;"><strong>Pink Wardrobe ✨</strong></p>

        <div class="app-container">
            <iframe src="https://PalakO.github.io/App/Fashion%20App/" width="100%" height="100%" style="border:none;"></iframe>
        </div>

        <a href="https://PalakO.github.io/App/Fashion%20App/" target="_blank" class="app-btn-link">
            Open App
        </a>

        <!-- YOUR APP -->
        <p style="text-align:center; margin-top:60px;"><strong>Quiz App 🧠</strong></p>

        <div class="app-container">
            <iframe src="https://po164-coder.github.io/Project/" width="100%" height="100%" style="border:none;"></iframe>
        </div>

        <a href="https://po164-coder.github.io/Project/" target="_blank" class="app-btn-link">
            Open Quiz App
        </a>

    </div>
</section>

</body>
</html>
